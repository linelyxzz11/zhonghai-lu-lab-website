backend:
  name: github
  repo: Zhonghai-Lu-Lab/zhonghai-lu-lab-website
  branch: main
  base_url: https://zhonghai-lu-lab-oauth.2030115290.workers.dev
  auth_type: pkce
  site_domain: zhonghai-lu-lab-website.pages.dev

publish_mode: editorial_workflow
media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: news_en
    label: News (English)
    folder: content/en/news
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime, time_format: false}
      - {label: Category, name: category, widget: string}
      - {label: Summary, name: summary, widget: text}
      - {label: Featured image, name: image, widget: image, required: false, hint: "Upload the main image shown on the homepage and article page"}
      - {label: Image alt text, name: image_alt, widget: string, required: false, hint: "Briefly describe the image for accessibility"}
      - {label: Body, name: body, widget: markdown}
  - name: news_zh
    label: 新闻（中文）
    folder: content/zh/news
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    fields:
      - {label: 标题, name: title, widget: string}
      - {label: 日期, name: date, widget: datetime, time_format: false}
      - {label: 分类, name: category, widget: string}
      - {label: 摘要, name: summary, widget: text}
      - {label: 封面图片, name: image, widget: image, required: false, hint: "上传显示在首页和新闻详情页的主图"}
      - {label: 图片说明, name: image_alt, widget: string, required: false, hint: "简要描述图片内容，用于无障碍访问"}
      - {label: 正文, name: body, widget: markdown}
  - name: events_en
    label: Carousel Events (English)
    folder: content/en/events
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime, time_format: false}
      - {label: Kicker, name: kicker, widget: string}
      - {label: Summary, name: summary, widget: text}
      - {label: Hero image, name: hero, widget: image}
      - {label: Image alt text, name: hero_alt, widget: string}
      - {label: Button text, name: button, widget: string}
      - {label: Button target, name: target, widget: string, hint: "Use a section anchor such as #news or a verified page path such as /publications/paper-slug/"}
      - {label: Show in carousel, name: featured, widget: boolean, default: true}
      - {label: Order, name: weight, widget: number, default: 10}
      - {label: Body, name: body, widget: markdown}
  - name: events_zh
    label: 轮播事件（中文）
    folder: content/zh/events
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: 标题, name: title, widget: string}
      - {label: 日期, name: date, widget: datetime, time_format: false}
      - {label: 栏目短标题, name: kicker, widget: string}
      - {label: 摘要, name: summary, widget: text}
      - {label: 主图, name: hero, widget: image}
      - {label: 图片替代文本, name: hero_alt, widget: string}
      - {label: 按钮文字, name: button, widget: string}
      - {label: 按钮目标, name: target, widget: string, hint: "填写栏目锚点（如 #news）或已核实的详情页路径（如 /zh/publications/paper-slug/）"}
      - {label: 进入轮播, name: featured, widget: boolean, default: true}
      - {label: 顺序, name: weight, widget: number, default: 10}
      - {label: 正文, name: body, widget: markdown}
  - name: publications_en
    label: Publications (English)
    folder: content/en/publications
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime, time_format: false}
      - {label: Authors, name: authors, widget: string}
      - {label: Venue, name: venue, widget: string, hint: "Journal or conference name"}
      - {label: Year, name: year, widget: number}
      - {label: DOI, name: doi, widget: string, required: false}
      - {label: PDF, name: pdf, widget: string, required: false, hint: "Path to the PDF inside the static folder, e.g. /uploads/papers/filename.pdf"}
      - {label: Summary, name: summary, widget: text}
      - {label: Body, name: body, widget: markdown}
  - name: publications_zh
    label: 出版物（中文）
    folder: content/zh/publications
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: 标题, name: title, widget: string}
      - {label: 日期, name: date, widget: datetime, time_format: false}
      - {label: 作者, name: authors, widget: string}
      - {label: 发表场所, name: venue, widget: string, hint: "期刊或会议名称"}
      - {label: 年份, name: year, widget: number}
      - {label: DOI, name: doi, widget: string, required: false}
      - {label: PDF, name: pdf, widget: string, required: false, hint: "PDF 相对路径，例如 /uploads/papers/filename.pdf"}
      - {label: 摘要, name: summary, widget: text}
      - {label: 正文, name: body, widget: markdown}
  - name: awards_en
    label: Awards (English)
    folder: content/en/awards
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime, time_format: false}
      - {label: Awarder, name: awarder, widget: string, hint: "Organization or program granting the award"}
      - {label: Level, name: level, widget: string, hint: "Optional, e.g. National / Provincial / University"}
      - {label: Summary, name: summary, widget: text}
      - {label: Body, name: body, widget: markdown}
  - name: awards_zh
    label: 奖项（中文）
    folder: content/zh/awards
    create: true
    path: '{{slug}}/index'
    fields:
      - {label: 标题, name: title, widget: string}
      - {label: 日期, name: date, widget: datetime, time_format: false}
      - {label: 颁奖方, name: awarder, widget: string, hint: "颁奖单位或项目名称"}
      - {label: 级别, name: level, widget: string, hint: "可选，例如 国家级 / 省级 / 校级"}
      - {label: 摘要, name: summary, widget: text}
      - {label: 正文, name: body, widget: markdown}
