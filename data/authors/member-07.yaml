bio: |
  I am currently a Ph.D. student at The Hong Kong University of Science and Technology (Guangzhou). I received my undergraduate degree from Fudan University and previously worked as a Senior Engineer in the Autonomous Driving Chip Department at NIO. My current research focuses on chiplet-based computer architectures, Network-on-Chip systems, and UCIe-based die-to-die communication. My broader research interests include computer architecture, on-chip and inter-chiplet interconnects, operating systems, and system-level resource scheduling for heterogeneous chiplet systems.
