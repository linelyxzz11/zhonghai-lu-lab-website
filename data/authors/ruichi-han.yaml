bio: |
  RUICHI HAN received the B.E. degree in Electronic Information Engineering from Zhejiang University, China, in 2024. He is currently pursuing the M.S. degree with the Department of Electronics and Embedded Systems, School of Electrical Engineering and Computer Science, KTH Royal Institute of Technology, Sweden. He is also a visiting research student at the Hong Kong University of Science and Technology (Guangzhou). His research interests include hardware accelerators for ML, computer architecture, and network-on-chip.
