overview:
  position: Professor with The Hong Kong University of Science and Technology (Guangzhou).
  previous: Previously, Professor of Electronic Systems Design, specializing in Dependable and Autonomous Systems, at the School of Electrical Engineering and Computer Science, KTH Royal Institute of Technology. At KTH, he served as Program Director for the Embedded Systems master's programme and as Director of Studies in Electronics and Embedded Systems.
  research:
    - My research spans Network-on-Chip and System-on-Chip, computer system architecture, electronic design automation, embedded systems, and prognostics and health management of electronic chips and systems.
    - My group works on in-network processing, embedded machine learning and AI accelerators, chiplet networks and architectures, and PHM of electronic chips and systems. We combine computation and communication for performance and power co-optimization, while using hardware acceleration and AI to address problems in computer architecture and embedded systems.
  support: I received research gifts from Intel Corporation in 2011–2013 and secured individual grants from the Swedish Research Council in 2014 and 2020.
  publications: I have authored more than 240 scientific papers. Complete publication records are provided below from DBLP, with additional links to Google Scholar and ORCID.
  awards:
    - Best Paper Candidate nominations at HPCA 2018, NOCS 2013, and ICCAD 2009.
    - Best Paper Award at NOCS 2015 and EU HiPEAC Paper Awards.
    - IEEE Transactions on Computers Featured Paper of the Month, September 2020.
    - Best Paper Award and Young Pioneer Award at PHMAP 2023.
    - Academic Paper Award at IEEE ICPHM 2024.
  services:
    - Prof. Lu has been appointed as Associate Editor for ACM Transactions on Architecture and Code Optimization (TACO) (CCF Class A) since 2019. Recently he was recommended to be Associate Editor for ACM Transactions on Design Automation of Electronic Systems (TODAES) (CCF Class B).
    - I was honored to be a General Chair for HiPEAC’2017 held in Stockholm, TPC Chair for NOCS’2017 held in Seoul, South Korea, and General Chair for NOCS’2018 held in Turin, Italy.
  education: BSc in Radio-electronics, Beijing Normal University (1989); MSc in System-on-Chip Design and PhD in Electronic Systems Design, KTH Royal Institute of Technology (2002, 2007); MBA in Innovation and Growth, University of Turku (2012).
