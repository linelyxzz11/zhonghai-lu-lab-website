bio: |
  Zhonghai Lu is a Professor in the Thrust of Microelectronics at The Hong Kong University of Science and Technology (Guangzhou). His work focuses on networked and intelligent computing systems, spanning Network-on-Chip, chiplet architectures, embedded machine learning, AI acceleration, and electronic-system reliability.
